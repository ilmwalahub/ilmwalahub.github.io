<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Page Not Found - ILMWALA HUB</title>

    <meta name="description" content="The page you are looking for could not be found. Return to ILMWALA HUB and continue your learning journey.">

    <link rel="stylesheet" href="main.css">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:30px;
        }

        .error-container{
            max-width:650px;
        }

        .error-code{
            font-size:7rem;
            font-weight:800;
            color:var(--primary);
            margin-bottom:10px;
        }

        .error-title{
            font-size:2rem;
            margin-bottom:15px;
        }

        .error-text{
            opacity:.8;
            margin-bottom:35px;
            line-height:1.7;
        }

        .home-btn{
            display:inline-block;
            padding:15px 35px;
            border-radius:999px;
            background:var(--primary);
            color:#fff;
            text-decoration:none;
            font-weight:600;
            transition:.3s;
        }

        .home-btn:hover{
            transform:translateY(-2px);
        }
    </style>

</head>

<body>

<div class="error-container">

    <div class="error-code">
        404
    </div>

    <h1 class="error-title">
        Oops! This page doesn't exist.
    </h1>

    <p class="error-text">
        The page you're looking for may have been moved, deleted, or the link may be incorrect.
        Let's get you back to learning.
    </p>

    <a href="/" class="home-btn">
        Return Home
    </a>

</div>

</body>

</html>
